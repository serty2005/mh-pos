services:
  pos-edge:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      POS_HTTP_ADDR: ":8080"
      POS_SQLITE_PATH: "/app/data/pos-edge.db"
      POS_SQLITE_MIGRATIONS_DIR: "/app/migrations/sqlite"
    ports:
      - "8080:8080"
    volumes:
      - pos_edge_sqlite:/app/data

volumes:
  pos_edge_sqlite:
