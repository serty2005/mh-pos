name: mh-pos-local

services:
  cloud-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mh_pos_cloud
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${CLOUD_POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - cloud_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mh_pos_cloud"]
      interval: 5s
      timeout: 3s
      retries: 20

  cloud-clickhouse:
    image: clickhouse/clickhouse-server:25.5-alpine
    environment:
      CLICKHOUSE_DB: mh_pos_cloud
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
    ports:
      - "${CLOUD_CLICKHOUSE_HOST_PORT:-8123}:8123"
      - "${CLOUD_CLICKHOUSE_NATIVE_HOST_PORT:-9000}:9000"
    volumes:
      - cloud_clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8123/ping | grep -q Ok"]
      interval: 5s
      timeout: 3s
      retries: 20

  license-api:
    build:
      context: .
      dockerfile: docker/license-api.Dockerfile
    ports:
      - "${LICENSE_API_HOST_PORT:-8095}:8095"
    volumes:
      - license_sqlite_data:/app/data

  cloud-api:
    build:
      context: .
      dockerfile: docker/cloud-api.Dockerfile
    depends_on:
      cloud-postgres:
        condition: service_healthy
      cloud-clickhouse:
        condition: service_healthy
      license-api:
        condition: service_started
    ports:
      - "${CLOUD_API_HOST_PORT:-8090}:8090"
    volumes:
      - cloud_api_data:/app/data

  pos-edge:
    build:
      context: .
      dockerfile: docker/pos-edge.Dockerfile
    depends_on:
      cloud-api:
        condition: service_started
      license-api:
        condition: service_started
    ports:
      - "${POS_EDGE_HOST_PORT:-8080}:8080"
    volumes:
      - pos_edge_sqlite_data:/app/data


volumes:
  cloud_postgres_data:
  cloud_clickhouse_data:
  cloud_api_data:
  license_sqlite_data:
  pos_edge_sqlite_data:
