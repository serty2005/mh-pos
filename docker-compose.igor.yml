name: mh-pos-local

services:
  cloud-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mh_pos_cloud
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${CLOUD_POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - cloud_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mh_pos_cloud"]
      interval: 5s
      timeout: 3s
      retries: 20

  cloud-clickhouse:
    image: clickhouse/clickhouse-server:25.5-alpine
    environment:
      CLICKHOUSE_DB: mh_pos_cloud
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
    ports:
      - "${CLOUD_CLICKHOUSE_HOST_PORT:-8123}:8123"
      - "${CLOUD_CLICKHOUSE_NATIVE_HOST_PORT:-9000}:9000"
    volumes:
      - cloud_clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8123/ping | grep -q Ok"]
      interval: 5s
      timeout: 3s
      retries: 20

  license-api:
    build:
      context: .
      dockerfile: docker/license-api.Dockerfile
    ports:
      - "8095:8095"
    volumes:
      - license_sqlite_data:/app/data

  cloud-api:
    build:
      context: .
      dockerfile: docker/cloud-api.Dockerfile
    depends_on:
      cloud-postgres:
        condition: service_healthy
      cloud-clickhouse:
        condition: service_healthy
      license-api:
        condition: service_started
    ports:
      - "8090:8090"
    volumes:
      - cloud_api_data:/app/data

  pos-edge:
    build:
      context: .
      dockerfile: docker/pos-edge.Dockerfile
    depends_on:
      cloud-api:
        condition: service_started
      license-api:
        condition: service_started
    ports:
      - "8080:8080"
    volumes:
      - pos_edge_sqlite_data:/app/data

  devbox:
    build:
      context: .
      dockerfile: docker/devbox.Dockerfile
    profiles:
      - devbox
    depends_on:
      cloud-api:
        condition: service_started
      license-api:
        condition: service_started
      pos-edge:
        condition: service_started
    working_dir: /workspace/myhoreca-pos
    environment:
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      POS_E2E_BOOTSTRAP_JSON: /workspace/myhoreca-pos/.e2e/bootstrap.json
      POS_E2E_UI_BASE: http://localhost:5173
      POS_E2E_API_BASE: http://pos-edge:8080/api/v1
      POS_E2E_CLOUD_BASE: http://cloud-api:8090/api/v1
      VITE_POS_API_BASE: http://pos-edge:8080/api/v1
      VITE_CLOUD_API_BASE: http://cloud-api:8090/api/v1
    ports:
      - "5173:5173"
      - "5174:5174"
    volumes:
      - .:/workspace/myhoreca-pos
      - pos_ui_node_modules:/workspace/myhoreca-pos/pos-ui/node_modules
      - cloud_ui_node_modules:/workspace/myhoreca-pos/cloud-ui/node_modules
      - devbox_npm_cache:/home/pwuser/.npm

volumes:
  cloud_postgres_data:
  cloud_clickhouse_data:
  cloud_api_data:
  license_sqlite_data:
  pos_edge_sqlite_data:
  pos_ui_node_modules:
  cloud_ui_node_modules:
  devbox_npm_cache:
